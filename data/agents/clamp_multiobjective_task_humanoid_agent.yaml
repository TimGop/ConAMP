agent_name: "CLAMPObjective" # Updated to your new Agent

model:
  actor_net: "fc_2layers_1024units"
  actor_init_output_scale: 0.01
  actor_std_type: "FIXED"
  action_std: 0.05

  critic_net: "fc_2layers_1024units"

  disc_net: "fc_2layers_1024units"

  # --- CLAMP Model Parameters ---
  task_dim: 2                # (X, Y) Goal dimension
  embed_dim: 64
  infonce_hidden_dim: 1024

actor_optimizer:
    type: "SGD"
    learning_rate: 5e-5

critic_optimizer:
    type: "SGD"
    learning_rate: 1e-4

disc_optimizer:
    type: "SGD"
    learning_rate: 2.5e-4
    weight_decay: 0.0001

infonce_optimizer:
    type: "Adam"
    learning_rate: 1e-4
    weight_decay: 0.0000

discount: 0.99
steps_per_iter: 32
iters_per_output: 200
test_episodes: 32
normalizer_samples: 100000000

actor_epochs: 5
actor_batch_size: 4
critic_epochs: 2
critic_batch_size: 2
disc_epochs: 2
disc_batch_size: 2

infonce_epochs: 5
infonce_batch_size: 256
infonce_temp: 0.1
logsumexp_penalty_coeff: 0.1

traj_buffer_size: 2000
max_ep_len: 1200

# --- Updated Curriculum Learning Schedule ---
warmup_steps: 20000000
anneal_steps: 30000000

# CRITICAL UPDATE:
# Task weight is much lower because it's now a direct loss penalty, not a reward.
# Style weight stays at 1.0 so the PPO Value function doesn't collapse.
target_task_weight: 0.05
target_style_weight: 1.0

td_lambda: 0.95
ppo_clip_ratio: 0.2
norm_adv_clip: 4.0
action_bound_weight: 10.0
action_entropy_weight: 0.0
action_reg_weight: 0.0

disc_buffer_size: 200000
disc_replay_samples: 1000
disc_logit_reg: 0.01
disc_grad_penalty: 5
disc_reward_scale: 2

task_reward_weight: 0.5
disc_reward_weight: 0.5